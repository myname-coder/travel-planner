<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>✈️ Travel Planner Pro</title>
<meta name="description" content="วางแผนเที่ยวหลายทริป พร้อมรูปภาพและแผนที่ — LIFF Ready">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- LINE LIFF SDK -->
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
/* ══════════ RESET & ROOT ══════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #f8fafc; /* Sleek modern light slate background */
  --sidebar:     #ffffff;
  --card:        #ffffff;
  --card-hover:  #f8fafc;
  --border:      #e2e8f0; /* Crisp thin borders */
  --border-hi:   #cbd5e1;
  --text:        #0f172a; /* Slate 900 for premium readability */
  --muted:       #64748b; /* Slate 500 for secondary text */
  --modal-bg:    #ffffff;
  --accent:      #ff5a5f; /* Elegant travel coral */
  --accent-light:#fff5f5;
  --hotel-c:     #3b82f6;  --hotel-bg:  #eff6ff;  --hotel-bd:  #bfdbfe;
  --rest-c:      #f97316;  --rest-bg:   #fff7ed;  --rest-bd:   #fed7aa;
  --cafe-c:      #8b5cf6;  --cafe-bg:   #f5f3ff;  --cafe-bd:   #ddd6fe;
  --attr-c:      #10b981;  --attr-bg:   #ecfdf5;  --attr-bd:   #a7f3d0;
  --shop-c:      #ec4899;  --shop-bg:   #fdf2f8;  --shop-bd:   #fbcfe8;
  --shadow-sm:   0 1px 3px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:   0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
  --shadow-lg:   0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.03);
}

html, body { height: 100%; font-family: 'Plus Jakarta Sans', 'Kanit', sans-serif; background: #f1f5f9; color: var(--text); overflow: hidden; -webkit-font-smoothing: antialiased; display: flex; align-items: center; justify-content: center; }

/* ══════════ SVG ICON SYSTEM ══════════ */
.icon {
  width: 18px; height: 18px;
  stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; fill: none;
  vertical-align: middle; display: inline-block; transition: transform 0.2s;
}
.btn-icon .icon { margin-right: 5px; }

/* ══════════ MOBILE-FIRST APP CONTAINER ══════════ */
.app {
  display: flex;
  width: 100%;
  max-width: 480px; /* Centered mobile container width */
  height: 100vh;
  background: var(--bg);
  position: relative;
  overflow: hidden;
  flex-direction: column;
  box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
@media (max-width: 480px) {
  .app { border-left: none; border-right: none; box-shadow: none; }
}

/* ══════════ SIDEBAR (Mobile overlay drawer) ══════════ */
.sidebar {
  position: absolute;
  top: 0;
  bottom: 0;
  left: -290px; /* Slides in from left */
  width: 280px;
  height: 100%;
  background: var(--sidebar);
  z-index: 200;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  border-right: 1px solid var(--border);
}
.sidebar.open {
  left: 0;
  box-shadow: 8px 0 24px rgba(15, 23, 42, 0.12);
}
.sidebar-top { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }

.brand { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.brand-icon {
  width: 42px; height: 42px;
  background: var(--accent); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(255, 90, 95, 0.25); flex-shrink: 0;
  color: #ffffff;
}
.brand-icon .icon { width: 22px; height: 22px; stroke-width: 2.5; }
.brand h1 { font-size: 1.05rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; line-height: 1.2; }
.brand p  { font-size: 0.65rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 1px; }

.btn-new-trip {
  width: 100%; padding: 12px; background: var(--accent);
  border: none; border-radius: 12px; color: #ffffff; font-family: inherit;
  font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 12px rgba(255, 90, 95, 0.2);
}
.btn-new-trip:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(255, 90, 95, 0.35); }
.btn-new-trip .icon { width: 16px; height: 16px; stroke-width: 2.5; }

.trip-list { flex: 1; overflow-y: auto; padding: 12px 8px; display: flex; flex-direction: column; gap: 4px; }
.trip-list::-webkit-scrollbar { width: 4px; }
.trip-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.trip-item { padding: 12px 14px; border-radius: 12px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; display: flex; align-items: center; gap: 10px; position: relative; }
.trip-item:hover { background: var(--card-hover); }
.trip-item.active { background: var(--accent-light); border-color: rgba(255, 90, 95, 0.15); color: var(--accent); }
.trip-emoji { font-size: 1.25rem; flex-shrink: 0; }
.trip-info  { flex: 1; min-width: 0; }
.trip-name  { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: inherit; }
.trip-dates { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
.trip-item.active .trip-dates { color: rgba(255, 90, 95, 0.7); }
.trip-count { font-size: 0.68rem; background: var(--bg); border-radius: 8px; padding: 2px 7px; color: var(--muted); font-weight: 700; flex-shrink: 0; }
.trip-item.active .trip-count { background: #ffffff; color: var(--accent); }
.trip-del { display: none; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.85rem; padding: 2px; transition: color 0.15s; }
.trip-item:hover .trip-del { display: block; }
.trip-del:hover { color: #ef4444; }

/* ══════════ MAIN AREA ══════════ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); padding-bottom: 68px; /* space for bottom navigation */ }

/* Trip Header */
.trip-header { padding: 16px 18px 0; flex-shrink: 0; border-bottom: 1px solid var(--border); background: #ffffff; }
.trip-header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.trip-big-emoji { font-size: 2rem; }
.trip-header-info { flex: 1; }
.trip-header-info h2 { font-size: 1.2rem; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
.trip-header-info p  { font-size: 0.75rem; color: var(--muted); margin-top: 2px; font-weight: 500; }
.trip-header-actions { display: flex; gap: 6px; flex-shrink: 0; }

.btn-icon { background: #ffffff; border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; color: var(--text); font-family: inherit; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.btn-icon:hover { background: var(--bg); border-color: var(--border-hi); }
.btn-icon .icon { width: 14px; height: 14px; }

/* Category Navigation Pills */
.cat-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 0; margin-top: 4px; }
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab { padding: 8px 14px; border-radius: 10px 10px 0 0; border: 1px solid transparent; border-bottom: none; background: none; color: var(--muted); font-family: inherit; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
.cat-tab:hover  { background: var(--bg); color: var(--text); }
.cat-tab.active { background: var(--bg); border-color: var(--border) var(--border) transparent; color: var(--accent); }
.cat-tab .icon  { width: 14px; height: 14px; }

/* Places Content Area */
.places-area { flex: 1; overflow-y: auto; padding: 18px; }
.places-area::-webkit-scrollbar { width: 4px; }
.places-area::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 10px; }

.category-section { margin-bottom: 24px; }
.category-section-title { font-size: 0.88rem; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: var(--text); text-transform: uppercase; letter-spacing: 0.03em; }

/* Grid view (Always single-column mobile style) */
.places-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }

/* Place Card (Mobile Full Width) */
.place-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); animation: fadeUp 0.35s ease both; display: flex; flex-direction: column; box-shadow: var(--shadow-sm); width: 100%; }
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
.place-card:hover { border-color: var(--border-hi); transform: translateY(-3px); box-shadow: var(--shadow-md); }

.card-photo { width: 100%; height: 150px; position: relative; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; background: #fafafa; }
.card-photo img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.35s; }
.place-card:hover .card-photo img { transform: scale(1.03); }

.room-badge { position: absolute; top: 12px; left: 12px; border-radius: 8px; padding: 4px 8px; font-size: 0.65rem; font-weight: 800; background: var(--text); color: #ffffff; border: 1px solid rgba(255,255,255,0.15); box-shadow: var(--shadow-sm); z-index: 4; }
.cat-badge { position: absolute; top: 12px; left: 12px; border-radius: 8px; padding: 4px 8px; font-size: 0.65rem; font-weight: 700; backdrop-filter: blur(8px); background: rgba(255,255,255,0.9); border: 1px solid rgba(255,255,255,0.6); box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 4px; transition: left 0.15s; }
.cat-badge .icon { width: 11px; height: 11px; }

/* Actions (Top Right) */
.card-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 6px; opacity: 1; z-index: 5; }
.card-act-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.9); backdrop-filter: blur(4px); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: var(--shadow-sm); }
.card-act-btn:hover { background: #ffffff; transform: scale(1.05); border-color: var(--border-hi); }
.card-act-btn.del:hover { background: #fee2e2; color: #ef4444; border-color: #fca5a5; }
.card-act-btn .icon { width: 14px; height: 14px; }

.card-body  { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 6px; background: #ffffff; }
.card-name  { font-size: 0.95rem; font-weight: 700; line-height: 1.4; color: var(--text); }
.card-meta  { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
.card-tag   { font-size: 0.68rem; color: var(--muted); background: var(--bg); border-radius: 6px; padding: 2.5px 8px; font-weight: 600; border: 1px solid var(--border); display: flex; align-items: center; gap: 4px; }
.card-tag .icon { width: 10px; height: 10px; }
.card-notes { font-size: 0.75rem; color: var(--muted); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.5; }
.card-maps-btn { margin-top: 8px; display: inline-flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--accent); text-decoration: none; font-weight: 700; background: var(--accent-light); border-radius: 8px; padding: 6px 12px; transition: all 0.15s; border: 1px solid rgba(255, 90, 95, 0.15); align-self: flex-start; }
.card-maps-btn:hover { background: rgba(255, 90, 95, 0.1); border-color: rgba(255, 90, 95, 0.3); }

/* Add Place Card (Mobile Full Width) */
.add-place-card { width: 100%; height: 80px; min-height: 80px; border: 2px dashed var(--border); background: #ffffff; border-radius: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: all 0.25s; color: var(--muted); box-shadow: var(--shadow-sm); }
.add-place-card:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.add-place-card .icon { width: 20px; height: 20px; stroke-width: 2.5; }
.add-place-card p { font-size: 0.8rem; font-weight: 700; }

/* ══════════ MOBILE BOTTOM NAVIGATION (Always visible inside app shell) ══════════ */
.bottom-nav {
  display: flex;
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 68px;
  background: #ffffff;
  border-top: 1px solid var(--border);
  box-shadow: 0 -4px 16px rgba(15, 23, 42, 0.04);
  z-index: 150;
  align-items: center;
  justify-content: space-around;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 4px;
  color: var(--muted); font-family: inherit; font-size: 0.65rem; font-weight: 600; cursor: pointer; flex: 1; padding: 8px 0;
}
.nav-item.active { color: var(--accent); }
.nav-item .icon { width: 20px; height: 20px; }
.fab-btn {
  width: 48px; height: 48px; border-radius: 50%; background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(255, 90, 95, 0.35); margin-top: -28px;
  transition: transform 0.2s, background-color 0.2s;
}
.fab-btn .icon { width: 24px; height: 24px; stroke: #ffffff; stroke-width: 2.5; }
.nav-item:hover .fab-btn { transform: scale(1.05); }

/* ══════════ EMPTY STATE ══════════ */
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: var(--muted); padding: 32px; text-align: center; }
.empty-state .es-icon { font-size: 3.5rem; }
.empty-state h2 { font-size: 1.2rem; font-weight: 800; color: var(--text); letter-spacing: -0.01em; }
.empty-state p  { font-size: 0.8rem; max-width: 280px; line-height: 1.6; color: var(--muted); }
.es-btn { padding: 12px 28px; background: var(--accent); border: none; border-radius: 12px; color: #ffffff; font-family: inherit; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 4px; box-shadow: 0 4px 12px rgba(255,90,95,0.2); }
.es-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(255,90,95,0.35); }

/* ══════════ MODALS ══════════ */
.modal-overlay { position: absolute; inset: 0; z-index: 1000; background: rgba(15,23,42,0.3); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-box { background: var(--modal-bg); border: 1px solid var(--border); border-radius: 24px; padding: 24px; width: 100%; max-width: 420px; max-height: 80vh; overflow-y: auto; transform: translateY(24px); transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--shadow-xl); }
.modal-overlay.open .modal-box { transform: translateY(0); }
.modal-box::-webkit-scrollbar { width: 4px; }
.modal-box::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }
.modal-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 18px; color: var(--text); letter-spacing: -0.02em; }

.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.fg input, .fg textarea {
  width: 100%; background: #f8fafc; border: 1px solid var(--border);
  border-radius: 12px; padding: 11px 14px; color: var(--text);
  font-family: inherit; font-size: 0.88rem; outline: none; transition: all 0.2s;
}
.fg input:focus, .fg textarea:focus { border-color: var(--accent); background: #ffffff; box-shadow: 0 0 0 3px rgba(255, 90, 95, 0.12); }
.fg input::placeholder, .fg textarea::placeholder { color: var(--muted); }
.fg textarea { resize: none; height: 70px; }
.fg-row { display: flex; gap: 10px; }
.fg-row .fg { flex: 1; margin-bottom: 0; }

/* Category Selector in modal */
.cat-selector { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; }
.cat-opt { padding: 8px 2px; border-radius: 12px; border: 1px solid var(--border); background: #ffffff; color: var(--muted); font-family: inherit; font-size: 0.62rem; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; }
.cat-opt .icon { width: 16px; height: 16px; display: block; margin: 0 auto 4px; }
.cat-opt:hover { background: var(--card-hover); }
.cat-opt.sel.hotel      { background: var(--hotel-bg); border-color: var(--hotel-bd); color: var(--hotel-c); }
.cat-opt.sel.restaurant { background: var(--rest-bg);  border-color: var(--rest-bd);  color: var(--rest-c); }
.cat-opt.sel.cafe       { background: var(--cafe-bg);  border-color: var(--cafe-bd);  color: var(--cafe-c); }
.cat-opt.sel.attraction { background: var(--attr-bg);  border-color: var(--attr-bd);  color: var(--attr-c); }
.cat-opt.sel.shopping   { background: var(--shop-bg);  border-color: var(--shop-bd);  color: var(--shop-c); }

/* Emoji Grid */
.emoji-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.emoji-opt { width: 38px; height: 38px; border-radius: 11px; border: 1px solid var(--border); background: #ffffff; font-size: 1.25rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.emoji-opt:hover  { border-color: var(--border-hi); background: var(--card-hover); }
.emoji-opt.sel    { border-color: var(--accent); background: var(--accent-light); }

/* Photo Input section */
.photo-preview { width: 100%; height: 120px; border-radius: 12px; overflow: hidden; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 8px; border: 1px solid var(--border); }
.photo-preview img { width: 100%; height: 100%; object-fit: cover; }
.btn-fetch { width: 100%; padding: 10px; border-radius: 12px; border: 1px dashed var(--border); background: #ffffff; color: var(--muted); font-family: inherit; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 8px; }
.btn-fetch:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.btn-fetch.loading { opacity: 0.6; pointer-events: none; }
.btn-fetch .icon { width: 14px; height: 14px; }

.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.btn-primary { flex: 1; padding: 12px; border-radius: 12px; border: none; background: var(--accent); color: #ffffff; font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(255,90,95,0.2); }
.btn-primary:hover { filter: brightness(1.05); }
.btn-cancel  { padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border); background: #ffffff; color: var(--muted); font-family: inherit; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
.btn-cancel:hover { background: var(--card-hover); color: var(--text); }

/* LINE button */
.btn-line { background: #06C755; border: none; border-radius: 10px; padding: 8px 16px; color: #ffffff; font-family: inherit; font-size: 0.78rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: filter 0.18s; }
.btn-line:hover { filter: brightness(1.05); }
.btn-line.hide { display: none; }

/* ══════════ TOAST ══════════ */
.toast { position: absolute; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: rgba(15,23,42,0.95); backdrop-filter: blur(8px); border-radius: 12px; padding: 12px 22px; color: #ffffff; font-size: 0.82rem; font-weight: 600; z-index: 9999; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); display: flex; align-items: center; gap: 8px; white-space: nowrap; box-shadow: var(--shadow-lg); border: 1px solid rgba(255,255,255,0.1); }
.toast.show    { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: rgba(74,222,128,0.3); }
.toast.error   { border-color: rgba(248,113,113,0.3); }
.toast.info    { border-color: rgba(96,165,250,0.3); }

.mobile-menu { display: flex !important; background: #ffffff; border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; color: var(--text); cursor: pointer; font-size: 1.15rem; }
.mob-overlay { display: none; position: absolute; inset: 0; z-index: 199; background: rgba(15,23,42,0.35); backdrop-filter: blur(2px); }
.mob-overlay.open { display: block; }
</style>
</head>
<body>

<div class="app">
  <div class="mob-overlay" id="mob-overlay" onclick="closeSidebar()"></div>
  <!-- ══ SIDEBAR ══ -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <div class="brand-icon">

<script>
// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const SK      = 'tp_pro_v2';
const LIFF_ID = '2010557291-eauwhXav'; // ✅ LINE MINI App LIFF ID

// 🔧 วาง Firebase Config ที่คัดลอกมาตรงนี้ เพื่อเริ่มใช้งานเรียลไทม์แชร์
const firebaseConfig = {
  apiKey: "AIzaSyBGsxC7-48YuPbdI6oSu1cGqNmyigENjQ8",
  authDomain: "travel-planner-44e37.firebaseapp.com",
  projectId: "travel-planner-44e37",
  storageBucket: "travel-planner-44e37.firebasestorage.app",
  messagingSenderId: "858821469018",
  appId: "1:858821469018:web:a3ee8349837b3aeb414963"
};

const ICONS = {
  all: `<svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
  hotel: `<svg class="icon" viewBox="0 0 24 24"><path d="M3 17h18M3 12h18M3 7v10M21 7v10M6 7h12a2 2 0 0 1 2 2v3H4V9a2 2 0 0 1 2-2z"/></svg>`,
  restaurant: `<svg class="icon" viewBox="0 0 24 24"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v4M12 15v7M17 2v20M21 2v6a3 3 0 0 1-3 3h-1V2h4z"/></svg>`,
  cafe: `<svg class="icon" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM6 1v3M10 1v3M14 1v3"/></svg>`,
  attraction: `<svg class="icon" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
  shopping: `<svg class="icon" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0"/></svg>`,
  plus: `<svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  edit: `<svg class="icon" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  trash: `<svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>`,
  share: `<svg class="icon" viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>`
};

const CATS = {
  hotel:      {l:'ที่พัก',    ic:'hotel',     c:'#3b82f6',bg:'#eff6ff',bd:'#bfdbfe'},
  restaurant: {l:'ร้านอาหาร',ic:'restaurant',c:'#f97316',bg:'#fff7ed',bd:'#fed7aa'},
  cafe:       {l:'คาเฟ่',    ic:'cafe',      c:'#8b5cf6',bg:'#f5f3ff',bd:'#ddd6fe'},
  attraction: {l:'ที่เที่ยว',ic:'attraction',c:'#10b981',bg:'#ecfdf5',bd:'#a7f3d0'},
  shopping:   {l:'ช้อปปิ้ง', ic:'shopping',   c:'#ec4899',bg:'#fdf2f8',bd:'#fbcfe8'}
};

const EMOJIS = ['🏔️','🌊','🗼','🌸','🏝️','🎎','🌅','🏜️','🌃','🎡','🗺️','✈️','🌴','⛩️','🏖️','🚂','🎆','🌿'];

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let DB  = {trips:[]};
let act = {tripId:null, cat:'all'};
let ui  = {emoji:'🗺️', cat:'attraction', photo:'', editId:null};
let isLiff = false;

let dbFS = null;
let syncActiveTripListener = null;
let ownerId = localStorage.getItem('tp_owner_id') || uid();
localStorage.setItem('tp_owner_id', ownerId);

// ═══════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════
const load = () => {
  try {
    const r = localStorage.getItem(SK);
    if (r) {
      const parsed = JSON.parse(r);
      if (parsed && Array.isArray(parsed.trips)) {
        DB = parsed;
      } else if (Array.isArray(parsed)) {
        DB = { trips: parsed };
      } else {
        DB = { trips: [] };
      }
    } else {
      DB = { trips: [] };
    }
  } catch(e) {
    DB = { trips: [] };
  }
};
const save = () => {
  try {
    localStorage.setItem(SK, JSON.stringify(DB));
  } catch(e) {}
};

// ═══════════════════════════════════════════════
//  FIREBASE CONFIG & STORAGE
// ═══════════════════════════════════════════════
function initFirebase() {
  if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY") {
    try {
      firebase.initializeApp(firebaseConfig);
      dbFS = firebase.firestore();
      return true;
    } catch (e) {
      console.error(e);
    }
  }
  return false;
}

async function saveTripToFS(trip) {
  if (!dbFS) return;
  try {
    await dbFS.collection('trips').doc(trip.id).set({
      id: trip.id,
      name: trip.name,
      dates: trip.dates || '',
      emoji: trip.emoji || '🗺️',
      places: trip.places || [],
      ownerId: ownerId,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) { console.error(e); }
}

async function deleteTripFromFS(tripId) {
  if (!dbFS) return;
  try {
    await dbFS.collection('trips').doc(tripId).delete();
  } catch(e) { console.error(e); }
}

function subscribeToTrip(tripId) {
  if (syncActiveTripListener) syncActiveTripListener();
  if (!dbFS) return;

  syncActiveTripListener = dbFS.collection('trips').doc(tripId).onSnapshot(doc => {
    if (doc.exists) {
      const data = doc.data();
      if (!Array.isArray(data.places)) data.places = [];
      const idx = DB.trips.findIndex(t => t.id === tripId);
      if (idx !== -1) {
        DB.trips[idx] = data;
      } else {
        DB.trips.push(data);
      }
      save();
      render();
    }
  });
}


// ═══════════════════════════════════════════════
//  LIFF
// ═══════════════════════════════════════════════
async function initLiff() {
  try {
    await liff.init({liffId:LIFF_ID});
    isLiff = liff.isInClient();
    if (liff.isLoggedIn()) {
      const profile = await liff.getProfile();
      if (profile && profile.userId) {
        ownerId = profile.userId;
        localStorage.setItem('tp_owner_id', ownerId);
      }
    }
  } catch(e){}
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function render() { renderSidebar(); renderMain(); }

function renderSidebar() {
  const el = document.getElementById('trip-list');
  if (!DB.trips || !DB.trips.length) {
    el.innerHTML = `<p style="padding:20px 8px;text-align:center;color:var(--muted);font-size:0.78rem;line-height:1.7">ยังไม่มีทริปครับ<br>กด "+ สร้างทริปใหม่" ด้านบน</p>`;
    return;
  }
  el.innerHTML = DB.trips.map(t => {
    const placesList = t.places || [];
    return `
      <div class="trip-item ${t.id===act.tripId?'active':''}" onclick="selTrip('${t.id}')">
        <span class="trip-emoji">${t.emoji || '🗺️'}</span>
        <div class="trip-info">
          <div class="trip-name">${esc(t.name)}</div>
          ${t.dates?`<div class="trip-dates">${esc(t.dates)}</div>`:''}
        </div>
        <span class="trip-count">${placesList.length}</span>
        <button class="trip-del" onclick="event.stopPropagation();delTrip('${t.id}')" title="ลบ">✕</button>
      </div>`;
  }).join('');
}

function renderMain() {
  const el = document.getElementById('main');
  if (!act.tripId) {
    el.innerHTML = `<div class="empty-state">
      <div class="es-icon" style="color:var(--accent); margin-bottom: 8px;">
        <svg class="icon" viewBox="0 0 24 24" style="width:64px;height:64px;stroke-width:1.5;"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </div>
      <h2>ยินดีต้อนรับสู่ Travel Planner Pro</h2>
      <p>เริ่มต้นด้วยการสร้างทริปแรกของคุณ จัดการสถานที่แบบแบ่งหมวดหมู่ พร้อมรูปภาพและแผนที่</p>
      <button class="es-btn" onclick="openTripModal()">+ สร้างทริปแรก</button>
    </div>`;
    return;
  }

  const trip = DB.trips.find(t=>t.id===act.tripId);
  if (!trip) return;

  const placesList = trip.places || [];

  // Sort places naturally by room number / order
  const sortedPlaces = [...placesList].sort((a, b) => {
    const roomA = String(a.roomNo || '').trim();
    const roomB = String(b.roomNo || '').trim();
    if (roomA === roomB) return 0;
    if (!roomA) return 1; // Empty rooms go to the end
    if (!roomB) return -1;
    return roomA.localeCompare(roomB, undefined, {numeric: true, sensitivity: 'base'});
  });

  const counts = {all:sortedPlaces.length};
  Object.keys(CATS).forEach(k=>counts[k]=sortedPlaces.filter(p=>p.cat===k).length);

  let mainContentHTML = '';
  if (act.cat === 'all') {
    // Show all places in a single unified grid
    mainContentHTML = `
      <div class="category-section">
        <div class="places-grid">
          ${sortedPlaces.map((p, i) => cardHTML(p, i)).join('')}
          <div class="add-place-card" onclick="openPlaceModal()">
            ${ICONS.plus}
            <p style="margin-top: 6px;">เพิ่มสถานที่</p>
          </div>
        </div>
      </div>
    `;
  } else {
    // Show grid for selected category
    const catVal = CATS[act.cat];
    const filteredPlaces = sortedPlaces.filter(p => p.cat === act.cat);
    mainContentHTML = `
      <div class="category-section">
        <div class="category-section-title" style="color:${catVal.c}">
          ${ICONS[catVal.ic]}
          <span style="margin-left: 6px;">${catVal.l}</span>
          <span class="ct-badge" style="background:${catVal.bg}; color:${catVal.c}; margin-left: 6px;">${filteredPlaces.length}</span>
        </div>
        <div class="places-grid">
          ${filteredPlaces.map((p, i) => cardHTML(p, i)).join('')}
          <div class="add-place-card" onclick="openPlaceModalWithCat('${act.cat}')">
            ${ICONS.plus}
            <p style="margin-top: 6px;">เพิ่ม${catVal.l}</p>
          </div>
        </div>
      </div>
    `;
  }

  el.innerHTML = `
    <div class="trip-header">
      <div class="trip-header-top">
        <button class="mobile-menu" onclick="openSidebar()">☰</button>
        <span class="trip-big-emoji">${trip.emoji || '🗺️'}</span>
        <div class="trip-header-info">
          <h2>${esc(trip.name)}</h2>
          ${trip.dates?`<p>📅 ${esc(trip.dates)}</p>`:''}
        </div>
      </div>
      <div class="cat-tabs">
        <button class="cat-tab ${act.cat==='all'?'active':''}" onclick="setCat('all')">${ICONS.all} ทั้งหมด <span class="ct-badge" style="margin-left: 4px;">${counts.all}</span></button>
        ${Object.entries(CATS).map(([k,v])=>`<button class="cat-tab ${act.cat===k?'active':''}" onclick="setCat('${k}')">${ICONS[v.ic]} ${v.l} <span class="ct-badge" style="margin-left: 4px;">${counts[k]}</span></button>`).join('')}
      </div>
    </div>
    <div class="places-area">
      ${mainContentHTML}
    </div>`;
}

function cardHTML(p, i) {
  const c = CATS[p.cat]||CATS.attraction;
  const photo = p.img
    ? `<img src="${esc(p.img)}" alt="${esc(p.name)}" data-id="${p.id}" data-room="${esc(p.roomNo||'')}" onerror="handleImgError(this, '${p.cat}')"/>`
    : `<div class="card-icon-fallback" style="color:${c.c}; display:flex; align-items:center; justify-content:center; width:100%; height:100%;">${ICONS[c.ic].replace('class="icon"', 'class="icon" style="width:40px;height:40px;stroke-width:1.8;"')}</div>`;
  const photoBg = p.img ? '' : `background:${c.bg}`;
  const mapsHref = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name+(p.province?' '+p.province:''))}`;

  return `<div class="place-card" style="animation-delay:${i*0.04}s" onclick="openPlaceModal('${p.id}')">
    <div class="card-photo" style="${photoBg}">
      ${photo}
      ${p.roomNo ? `<span class="room-badge">${esc(p.roomNo)}</span>` : ''}
      <span class="cat-badge" style="background:${c.bg};color:${c.c};border-color:${c.bd}; left:${p.roomNo ? '66px' : '12px'}">
        ${ICONS[c.ic].replace('class="icon"', 'class="icon icon-sm"')}
        <span style="margin-left: 4px;">${c.l}</span>
      </span>
      <div class="card-actions">
        <button class="card-act-btn" onclick="event.stopPropagation();openPlaceModal('${p.id}')" title="แก้ไข">${ICONS.edit}</button>
        <button class="card-act-btn del" onclick="event.stopPropagation();delPlace('${p.id}')" title="ลบ">${ICONS.trash}</button>
      </div>
    </div>
    <div class="card-body">
      <div class="card-name">${esc(p.name)}</div>
      <div class="card-meta">
        ${p.province?`<span class="card-tag"><svg class="icon" style="width:12px;height:12px;" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ${esc(p.province)}</span>`:''}
        ${p.date?`<span class="card-tag"><svg class="icon" style="width:12px;height:12px;" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${esc(p.date)}</span>`:''}
      </div>
      ${p.notes?`<div class="card-notes">${esc(p.notes)}</div>`:''}
      <a class="card-maps-btn" href="${mapsHref}" target="_blank" onclick="event.stopPropagation()">
        <svg class="icon" style="width:12px;height:12px;" viewBox="0 0 24 24"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
        Google Maps
      </a>
    </div>
  </div>`;
}

function handleImgError(imgEl, cat) {
  const c = CATS[cat] || CATS.attraction;
  const roomNo = imgEl.dataset.room || '';
  imgEl.parentElement.innerHTML = `<div class="card-icon-fallback" style="color:${c.c}; display:flex; align-items:center; justify-content:center; width:100%; height:100%;">${ICONS[c.ic].replace('class="icon"', 'class="icon" style="width:40px;height:40px;stroke-width:1.8;"')}</div>
    ${roomNo ? `<span class="room-badge">${esc(roomNo)}</span>` : ''}
    <span class="cat-badge" style="background:${c.bg};color:${c.c};border-color:${c.bd}; left:${roomNo ? '66px' : '12px'}">
      ${ICONS[c.ic].replace('class="icon"', 'class="icon icon-sm"')}
      <span style="margin-left: 4px;">${c.l}</span>
    </span>
    <div class="card-actions">
      <button class="card-act-btn" onclick="event.stopPropagation();openPlaceModal('${imgEl.dataset.id}')" title="แก้ไข">${ICONS.edit}</button>
      <button class="card-act-btn del" onclick="event.stopPropagation();delPlace('${imgEl.dataset.id}')" title="ลบ">${ICONS.trash}</button>
    </div>`;
}

function openPlaceModalWithCat(cat) {
  openPlaceModal();
  ui.cat = cat;
  buildCatSelector();
  setPhotoPreview(ui.photo, ui.cat);
}

// ═══════════════════════════════════════════════
//  TRIP CRUD
// ═══════════════════════════════════════════════
function openTripModal() {
  ui.emoji = '🗺️';
  document.getElementById('t-name').value  = '';
  document.getElementById('t-dates').value = '';
  document.getElementById('emoji-grid').innerHTML = EMOJIS.map(e=>
    `<div class="emoji-opt ${e===ui.emoji?'sel':''}" onclick="pickEmoji('${e}',this)">${e}</div>`
  ).join('');
  openModal('modal-trip');
  setTimeout(()=>document.getElementById('t-name').focus(),280);
}

function pickEmoji(e, el) {
  ui.emoji = e;
  document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
}

function saveTrip() {
  const name  = document.getElementById('t-name').value.trim();
  const dates = document.getElementById('t-dates').value.trim();
  if (!name) { toast('⚠️ กรุณากรอกชื่อทริปก่อนครับ','error'); return; }
  const t = {id:uid(), name, dates, emoji:ui.emoji, places:[]};
  DB.trips.push(t);
  act.tripId = t.id; act.cat = 'all';
  save();
  if (dbFS) {
    saveTripToFS(t);
    subscribeToTrip(t.id);
  }
  closeModal('modal-trip'); render();
  toast(`✅ สร้างทริป "${name}" แล้ว!`,'success');
}

function selTrip(id) {
  act.tripId=id; act.cat='all';
  if (dbFS) subscribeToTrip(id);
  render(); closeSidebar();
}

function delTrip(id) {
  const t = DB.trips.find(x=>x.id===id);
  if (!t || !confirm(`ลบทริป "${t.name}" ออกทั้งหมดไหมครับ?`)) return;
  DB.trips = DB.trips.filter(x=>x.id!==id);
  if (act.tripId===id) act.tripId = DB.trips[0]?.id||null;
  save();
  if (dbFS) deleteTripFromFS(id);
  render(); toast('🗑️ ลบทริปเรียบร้อยแล้ว','info');
}

// ═══════════════════════════════════════════════
//  PLACE CRUD
// ═══════════════════════════════════════════════
function openPlaceModal(editId=null) {
  ui.editId = editId; ui.photo = '';
  if (editId) {
    const trip = DB.trips.find(t=>t.id===act.tripId);
    const placesList = trip?.places || [];
    const p    = placesList.find(x=>x.id===editId);
    if (p) {
      ui.cat = p.cat; ui.photo = p.img||'';
      document.getElementById('modal-place-title').textContent = 'แก้ไขสถานที่';
      document.getElementById('p-name').value     = p.name;
      document.getElementById('p-province').value = p.province||'';
      document.getElementById('p-date').value     = p.date||'';
      document.getElementById('p-notes').value    = p.notes||'';
      document.getElementById('p-img').value      = p.img||'';
      document.getElementById('p-room').value     = p.roomNo||'';
    }
  } else {
    ui.cat = 'attraction';
    document.getElementById('modal-place-title').textContent = 'เพิ่มสถานที่';
    ['p-name','p-province','p-date','p-notes','p-img','p-room'].forEach(id=>document.getElementById(id).value='');
  }
  buildCatSelector();
  setPhotoPreview(ui.photo, ui.cat);
  openModal('modal-place');
  setTimeout(()=>document.getElementById('p-name').focus(),280);
}

function buildCatSelector() {
  document.getElementById('cat-selector').innerHTML = Object.entries(CATS).map(([k,v])=>
    `<div class="cat-opt ${k===ui.cat?'sel '+k:''}" onclick="pickCat('${k}',this)">
      ${ICONS[v.ic]}
      <span style="display:block; margin-top:4px;">${v.l}</span>
    </div>`
  ).join('');
}

function pickCat(k, el) {
  ui.cat = k;
  document.querySelectorAll('.cat-opt').forEach(x=>x.className='cat-opt');
  el.classList.add('sel', k);
  if (!ui.photo) setPhotoPreview('', k);
}

function setPhotoPreview(url, cat) {
  const c   = CATS[cat]||CATS.attraction;
  const pre = document.getElementById('photo-preview');
  if (url) {
    pre.innerHTML = `<img src="${esc(url)}" style="width:100%;height:100%;object-fit:cover" onerror="setPhotoPreview('','${cat}')" alt="preview">`;
  } else {
    pre.innerHTML = ICONS[c.ic].replace('class="icon"', 'class="icon" style="width:48px;height:48px;color:' + c.c + ';"');
    pre.style.background = c.bg;
    pre.style.borderColor = c.bd;
  }
}

function onImgInput() {
  const v = document.getElementById('p-img').value.trim();
  ui.photo = v ? fixImgUrl(v) : '';
  setPhotoPreview(ui.photo, ui.cat);
}

async function savePlace() {
  const name     = document.getElementById('p-name').value.trim();
  const province = document.getElementById('p-province').value.trim();
  const date     = document.getElementById('p-date').value.trim();
  const notes    = document.getElementById('p-notes').value.trim();
  const imgRaw   = document.getElementById('p-img').value.trim();
  const roomNo   = document.getElementById('p-room').value.trim();
  if (!name) { toast('⚠️ กรุณากรอกชื่อสถานที่ก่อนครับ','error'); return; }

  const img  = imgRaw ? fixImgUrl(imgRaw) : ui.photo;
  const trip = DB.trips.find(t=>t.id===act.tripId);
  if (!trip) return;

  if (!trip.places) trip.places = [];

  if (ui.editId) {
    const p = trip.places.find(x=>x.id===ui.editId);
    if (p) Object.assign(p,{cat:ui.cat,name,province,date,notes,img,roomNo});
  } else {
    const p = {id:uid(),cat:ui.cat,name,province,date,notes,img,lat:null,lng:null,roomNo};
    trip.places.push(p);
    geocodeBg(p.id, name, province, trip.id);
  }

  save();
  if (dbFS) saveTripToFS(trip);
  closeModal('modal-place'); render();
  toast(`✅ ${ui.editId?'แก้ไข':'เพิ่ม'} "${name}" เรียบร้อยแล้ว`,'success');
  ui.editId = null;
}

function delPlace(pid) {
  const trip = DB.trips.find(t=>t.id===act.tripId);
  if (!trip || !trip.places) return;
  const p = trip.places.find(x=>x.id===pid);
  if (!p || !confirm(`ลบ "${p.name}" ออกไหมครับ?`)) return;
  trip.places = trip.places.filter(x=>x.id!==pid);
  save();
  if (dbFS) saveTripToFS(trip);
  render(); toast('🗑️ ลบสถานที่แล้ว','info');
}

function setCat(c) { act.cat=c; renderMain(); }

// ═══════════════════════════════════════════════
//  PHOTO — Wikipedia API (ฟรี ไม่ต้อง Key)
// ═══════════════════════════════════════════════
async function doFetchPhoto() {
  const name     = document.getElementById('p-name').value.trim();
  const province = document.getElementById('p-province').value.trim();
  if (!name) { toast('⚠️ กรอกชื่อสถานที่ก่อนครับ','error'); return; }

  const btn = document.getElementById('btn-fetch');
  const fic = document.getElementById('fetch-icon');
  const ftx = document.getElementById('fetch-txt');
  btn.classList.add('loading');
  fic.textContent='⏳'; ftx.textContent='กำลังค้นหารูปภาพ...';
  toast('🔍 กำลังค้นหารูปจาก Wikipedia...','info');

  const url = await wikiPhoto(name, province);

  if (url) {
    ui.photo = url;
    document.getElementById('p-img').value = url;
    setPhotoPreview(url, ui.cat);
    toast('✅ พบรูปภาพเรียบร้อยแล้ว','success');
  } else {
    toast('📷 ไม่พบรูปใน Wikipedia — ลองวาง URL รูปเองด้านล่างครับ','error');
  }

  btn.classList.remove('loading');
  fic.textContent='🔍'; ftx.textContent='ดึงรูปอัตโนมัติจาก Wikipedia';
}

async function wikiPhoto(name, province) {
  const queries = [
    province?`${name} ${province}`:name,
    name,
    `${name} Thailand`
  ];
  for (const q of queries) {
    for (const lang of ['th','en']) {
      try {
        const url  = `https://${lang}.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(q)}&prop=pageimages&format=json&pithumbsize=600&origin=*`;
        const res  = await fetch(url);
        const data = await res.json();
        const page = Object.values(data.query.pages)[0];
        if (page?.thumbnail?.source) return page.thumbnail.source;
      } catch(e){}
    }
  }
  return null;
}

// ═══════════════════════════════════════════════
//  GEOCODE (Nominatim — Background)
// ═══════════════════════════════════════════════
async function geocodeBg(pid, name, province, tripId) {
  try {
    const q   = province?`${name} ${province} ประเทศไทย`:name;
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,{headers:{'User-Agent':'TravelPlannerPro/1.0'}});
    const arr = await res.json();
    if (arr.length) {
      const trip = DB.trips.find(t=>t.id===tripId);
      if (trip && trip.places) {
        const p = trip.places.find(x=>x.id===pid);
        if (p) {
          p.lat=parseFloat(arr[0].lat);
          p.lng=parseFloat(arr[0].lon);
          save();
          if (dbFS) saveTripToFS(trip);
        }
      }
    }
  } catch(e){}
}

// ═══════════════════════════════════════════════
//  IMAGE URL FIX (Google Drive → Direct)
// ═══════════════════════════════════════════════
function fixImgUrl(url) {
  const m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  return m ? `https://drive.google.com/uc?export=view&id=${m[1]}` : url;
}

// ═══════════════════════════════════════════════
//  CSV EXPORT
// ═══════════════════════════════════════════════
function exportCSV(tid) {
  const trip = DB.trips.find(t=>t.id===tid);
  if (!trip?.places.length) { toast('⚠️ ยังไม่มีสถานที่ในทริปนี้ครับ','error'); return; }
  const hdr  = ['หมวดหมู่','ชื่อสถานที่','จังหวัด','วันที่','โน้ต','Latitude','Longitude','Google Maps Link'];
  const rows = trip.places.map(p=>[
    CATS[p.cat]?.l||p.cat, p.name, p.province||'', p.date||'', p.notes||'',
    p.lat||'', p.lng||'',
    p.lat?`https://www.google.com/maps?q=${p.lat},${p.lng}`:''
  ]);
  const csv  = [hdr,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const a    = Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`${trip.name}_${new Date().toISOString().slice(0,10)}.csv`});
  a.click(); URL.revokeObjectURL(a.href);
  toast(`✅ Export CSV ${trip.places.length} สถานที่เรียบร้อย`,'success');
}

// ═══════════════════════════════════════════════
//  LINE SHARE & COPY LINK
// ═══════════════════════════════════════════════
function copyShareLink(tripId) {
  let shareUrl = window.location.origin + window.location.pathname + '?trip=' + tripId;
  if (isLiff) {
    shareUrl = `https://liff.line.me/${LIFF_ID}?trip=${tripId}`;
  }
  navigator.clipboard.writeText(shareUrl).then(() => {
    toast('📋 คัดลอกลิงก์แชร์เรียบร้อยแล้ว ส่งให้เพื่อนกดเข้าทริปได้เลย!', 'success');
  }).catch(() => {
    toast('❌ คัดลอกลิงก์ไม่สำเร็จ', 'error');
  });
}

async function shareToLine() {
  if (!isLiff||!liff.isInClient()) { toast('กรุณาเปิดในแอป LINE ครับ','error'); return; }
  const trip = DB.trips.find(t=>t.id===act.tripId);
  if (!trip) return;
  try {
    let link = `https://liff.line.me/${LIFF_ID}?trip=${trip.id}`;
    await liff.shareTargetPicker([{
      type:'flex', altText:`✈️ แผนทริป: ${trip.name}`,
      contents:{
        type:'bubble',
        body:{ type:'box', layout:'vertical', spacing:'md', contents:[
          {type:'text',text:`${trip.emoji} ${trip.name}`,weight:'bold',size:'xl',color:'#1e293b'},
          {type:'text',text:trip.dates||'ดูแผนเที่ยวด้านล่าง',size:'sm',color:'#64748b'},
          {type:'separator',margin:'md'},
          {type:'text',text:`📍 ${trip.places.length} สถานที่`,size:'sm',color:'#475569',margin:'md'}
        ]},
        footer:{ type:'box', layout:'vertical', contents:[{
          type:'button', style:'primary', color:'#3b82f6',
          action:{type:'uri',label:'เปิดแผนทริป',uri:link}
        }]}
      }
    }]);
    toast('✅ แชร์ใน LINE เรียบร้อยแล้ว','success');
  } catch(e){ toast('❌ แชร์ไม่สำเร็จ','error'); }
}

// ═══════════════════════════════════════════════
//  MODAL / SIDEBAR HELPERS

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('mob-overlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('mob-overlay').classList.remove('open'); }

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
let toastT;
function toast(msg,type='info'){
  const el=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  el.className=`toast ${type} show`;
  clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('show'),3200);
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeModal('modal-trip'); closeModal('modal-place'); }
});

// ═══════════════════════════════════════════════
//  FIREBASE ASYNC LOADER
// ═══════════════════════════════════════════════
async function loadTrips() {
  load(); // 1. โหลด offline cache ก่อน
  
  if (!dbFS) {
    if (DB.trips.length && !act.tripId) {
      act.tripId = DB.trips[0].id;
    }
    return;
  }

  try {
    // 2. ดึงทริปทั้งหมดจาก Firestore เพื่อให้ทุกคนเห็นทริปของกันและกันได้
    const snapshot = await dbFS.collection('trips').get();
    const fetched = [];
    snapshot.forEach(doc => fetched.push(doc.data()));

    DB.trips = fetched;
    save();

    // 3. ตรวจสอบทริปที่แชร์ผ่านลิงก์ URL
    const urlParams = new URLSearchParams(window.location.search);
    const urlTripId = urlParams.get('trip');

    // 4. เลือกทริปใช้งาน
    if (urlTripId) {
      act.tripId = urlTripId;
    } else if (DB.trips.length && !act.tripId) {
      act.tripId = DB.trips[0].id;
    }

    if (act.tripId) {
      subscribeToTrip(act.tripId);
    }
  } catch (e) {
    console.error(e);
  }
}

// ═══════════════════════════════════════════════

(async()=>{
  initFirebase();
  await loadTrips();
